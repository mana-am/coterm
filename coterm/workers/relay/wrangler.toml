# Open-source coterm collaboration relay — Cloudflare Worker + Durable Objects.
#
# This is a faithful port of workers/collaboration from the coterm repo. The only
# behavioral change is the join-grant gate on /connect (see src/handler.ts).

name = "coterm-relay"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

[observability]
enabled = true

[vars]
# "hmac" verifies signed join grants. "noauth" is for local testing only.
COLLAB_AUTH_MODE = "hmac"

# Secrets (set via `wrangler secret put`, or `.dev.vars` for local dev):
#   COLLAB_AUTH_SECRET     — shared HMAC secret (required when COLLAB_AUTH_MODE=hmac)
#   COLLABORATION_ADMIN_TOKEN — gates GET /v1/collaboration/admin/sessions[/:code]

[[durable_objects.bindings]]
name = "COLLABORATION_SESSIONS"
class_name = "CollaborationSessionObject"

[[durable_objects.bindings]]
name = "COLLABORATION_SESSION_INDEX"
class_name = "CollaborationSessionIndexObject"

[[durable_objects.bindings]]
name = "COLLABORATION_INBOX"
class_name = "CollaborationInboxObject"

[[durable_objects.bindings]]
name = "PREVIEW_SESSIONS"
class_name = "PreviewSessionObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationSessionObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CollaborationSessionIndexObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["CollaborationInboxObject"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["PreviewSessionObject"]
