# cmux Multiplayer collaboration relay — Cloudflare Worker + Durable Objects.
#
# Deploys run from .github/workflows/collaboration.yml on push to main. The
# Durable Object migration block is the service's schema migration story:
# wrangler applies class migrations atomically with every deploy.

name = "cmux-collaboration-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

[observability]
enabled = true

[[durable_objects.bindings]]
name = "COLLABORATION_SESSIONS"
class_name = "CollaborationSessionObject"

[[durable_objects.bindings]]
name = "COLLABORATION_SESSION_INDEX"
class_name = "CollaborationSessionIndexObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationSessionObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CollaborationSessionIndexObject"]

