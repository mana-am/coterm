# Open-source mosaic collaboration control-plane — the /api/collab/* surface the
# Swift client talks to. This layer does not exist in the upstream mosaic repo (it
# lived in a closed www service tied to Clerk + Stripe); it is reconstructed here
# from the client contract, with entitlements/identity supplied by the pluggable
# auth provider instead of Clerk/Stripe.

name = "mosaic-oss-collab-control-plane"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

[observability]
enabled = true

[vars]
COLLAB_AUTH_MODE = "noauth"
# Where the control-plane tells clients to reach the relay, and where it
# pre-creates rooms / probes liveness / fans out inbox nudges.
COLLAB_RELAY_URL = "http://localhost:8787"

# Secret (set via `wrangler secret put` or `.dev.vars`):
#   COLLAB_AUTH_SECRET — shared HMAC secret (required when COLLAB_AUTH_MODE=hmac)

[[durable_objects.bindings]]
name = "INVITE_STORE"
class_name = "InviteStoreObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InviteStoreObject"]
